name: Deploy

on:
  push:
    branches:
      - main

permissions:
  contents: read
  deployments: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    environment:
      name: production
    steps:
      - name: Check Cloudflare secrets
        id: secrets
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID" ]; then
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Cloudflare secrets are not configured; skipping deploy."
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/checkout@v4
        if: steps.secrets.outputs.ready == 'true'

      - uses: actions/setup-node@v4
        if: steps.secrets.outputs.ready == 'true'
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        if: steps.secrets.outputs.ready == 'true'
        run: npm ci

      - name: Build
        if: steps.secrets.outputs.ready == 'true'
        run: npm run build

      - name: Deploy to Cloudflare Pages
        id: deploy
        if: steps.secrets.outputs.ready == 'true'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
          command: pages deploy dist --project-name=vibe-code-presents --branch=${{ github.ref_name }}
